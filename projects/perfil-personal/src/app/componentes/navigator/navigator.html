<nav class="navigator">
  <ul>
    <li>
      <a class="home-link" routerLink="/blog" routerLinkActive="active" aria-label="Inicio">
        <lib-icon name="home" [size]="18" />
      </a>
    </li>
    <li>
      <a routerLink="/utilidades" routerLinkActive="active">
        <lib-icon name="wrench" [size]="16" />
        <span>Utilidades</span>
      </a>
    </li>
    <li>
      <a routerLink="/libros" routerLinkActive="active">
        <lib-icon name="book-open" [size]="16" />
        <span>Libros</span>
      </a>
    </li>
    <li>
      <a href="https://comidas.tatoh.ar" target="_blank" rel="noopener">
        <lib-icon name="utensils" [size]="16" />
        <span>Comidas</span>
      </a>
    </li>
  </ul>

  <a
    class="amazon-link"
    rel="noopener noreferrer"
    target="_blank"
    title="Ver mis libros en Amazon"
    [href]="getAmazonUrl()"
  >
    <span [innerHTML]="getAmazonSvg()"></span>
  </a>
</nav>
