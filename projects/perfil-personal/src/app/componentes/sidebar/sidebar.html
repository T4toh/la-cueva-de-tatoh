<section class="layout">
  <div class="header">
    <lib-avatar imagenUrl="LSK-A.jpg" nombre="Ignacio Martín Arano" />
  </div>
  <div class="main">
    <!-- Breve descripción -->
    <div class="bio-section">
      <p class="bio">{{ descripcion() }}</p>
    </div>

    <!-- Posts recientes -->
    <div class="posts-recientes-section">
      <h3 class="section-title">Posts Recientes</h3>
      <div class="posts-list">
        @for (post of recentPosts(); track post.src) {
        <a class="post-link" [routerLink]="['/blog', getPostIndex(post.title)]">
          <div class="post-item">
            <span class="post-title">{{ post.title }}</span>
            <span class="post-date">{{ post.fecha }}</span>
          </div>
        </a>
        }
      </div>
    </div>

    <!-- skills -->
    <div class="skills-section">
      <h3 class="section-title">Stack</h3>
      <div class="skills-list">
        @for (s of skills(); track $index) {
        <lib-skill-bar
          [color]="s.color"
          [nivel]="s.nivel"
          [skill]="s.skill"
          [textColor]="s.textColor"
        />
        }
      </div>
    </div>
    <!-- intereses -->
    <div class="tags-section">
      <h3 class="section-title">Intereses</h3>
      <div class="tags-list">
        @for (i of intereses(); track $index) {
        <lib-tag [texto]="i.nombre" />
        }
      </div>
    </div>
  </div>
  <div class="footer">
    <lib-redes [redes]="redes()" />
    <hr class="divisor" />
    <lib-footer />
  </div>
</section>
