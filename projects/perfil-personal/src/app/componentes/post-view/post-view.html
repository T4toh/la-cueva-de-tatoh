<div class="post-view-container">
  @if (currentPost()) {
    <div class="post-view">
      <a class="back-link" routerLink="/blog">
        <lib-icon name="arrow-right" [size]="14" />
        <span>Volver al blog</span>
      </a>
      <div class="post-meta">
        <h1>{{ extractedTitle() || currentPost()!.title }}</h1>
        <span class="post-fecha">{{ currentPost()!.fecha }}</span>
      </div>

      <div class="post-content">
        <markdown [src]="currentPost()!.src" />
      </div>
    </div>
  }
</div>
