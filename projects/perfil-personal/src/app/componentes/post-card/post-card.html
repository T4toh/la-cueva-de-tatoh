<a
  class="post-card"
  [class.reciente]="esReciente()"
  [routerLink]="['/blog', id()]"
>
  <span class="meta">
    <time>{{ fecha() }}</time>
    @if (esReciente()) {
      <span class="badge">Nuevo</span>
    }
  </span>

  <h2>{{ titulo() }}</h2>

  @if (tags().length > 0) {
    <span class="tags">
      @for (tag of tags(); track tag; let last = $last) {
        <span class="tag">{{ tag }}</span>
        @if (!last) { <span class="sep">·</span> }
      }
    </span>
  }
</a>
